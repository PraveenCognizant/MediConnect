<app-header></app-header>

<div class="menu">
  <div class="sidebar-profile">
    <div class="sidebar-avatar">
      <img *ngIf="gender === 'male' || gender === 'Male'" [src]="'assets/img/maledoctor.png'">
      <img *ngIf="gender === 'female' || gender === 'Female'" [src]="'assets/img/femaledoctor.png'">
    </div>
    <div class="sidebar-name">{{name}}</div>
    <div class="sidebar-role-badge">Doctor</div>
  </div>
  <nav class="sidebar-nav">
    <a class="sidebar-link" [routerLink]="['/editdoctorprofile']"><i class="fa fa-user-circle"></i><span>My Profile</span></a>
    <a class="sidebar-link" [routerLink]="['/approvalstatus']"><i class="fa fa-check-circle"></i><span>Approval Status</span></a>
    <a class="sidebar-link" [routerLink]="['/scheduleslots']"><i class="fa fa-calendar-o"></i><span>My Schedule</span></a>
    <a class="sidebar-link" [routerLink]="['/doctorlist']"><i class="fa fa-user-md"></i><span>Doctor List</span></a>
    <a class="sidebar-link" [routerLink]="['/patientlist']"><i class="fa fa-heartbeat"></i><span>Patients</span></a>
    <a class="sidebar-link" [routerLink]="['/appointments']"><i class="fa fa-stethoscope"></i><span>Appointments</span></a>
    <a class="sidebar-link" [routerLink]="['/addprescription']"><i class="fa fa-file-text"></i><span>Add Prescription</span></a>
  </nav>
</div>

<div class="dashboard-page">
  <div class="dashboard-welcome"><b>Welcome to MediConnect &mdash; Doctor Dashboard</b></div>
  <div class="dashboard-grid">
    <div class="dashboard-card">
      <div class="circle"><i id="icons" class="fa fa-sticky-note"></i></div>
      <div class="text">Prescriptions</div>
      <div class="sub-text" *ngFor="let prescription of prescriptions | async">{{prescription}} medications</div>
    </div>
    <div class="dashboard-card card-success">
      <div class="circle"><i id="icons" class="fa fa-user"></i></div>
      <div class="text">Total Doctors</div>
      <div class="sub-text" *ngFor="let doctor of doctors | async">{{doctor}} doctors</div>
    </div>
    <div class="dashboard-card card-navy">
      <div class="circle"><i id="icons" class="fa fa-calendar"></i></div>
      <div class="text">Total Slots</div>
      <div class="sub-text" *ngFor="let slot of slots | async">{{slot}} slots</div>
    </div>
  </div>
</div>

<app-footer></app-footer>
