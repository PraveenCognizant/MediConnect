<app-header></app-header>

<!-- Sidebar -->
<div class="menu">
  <div class="sidebar-profile">
    <div class="sidebar-avatar">
      <img *ngIf="gender === 'male' || gender === 'Male'" [src]="'assets/img/maleuser.png'">
      <img *ngIf="gender === 'female' || gender === 'Female'" [src]="'assets/img/femaleuser.png'">
    </div>
    <div class="sidebar-name">{{name}}</div>
    <div class="sidebar-role-badge">Patient</div>
  </div>
  <nav class="sidebar-nav">
    <a class="sidebar-link" [routerLink]="['/edituserprofile']"><i class="fa fa-user-circle"></i><span>My Profile</span></a>
    <a class="sidebar-link" [routerLink]="['/doctorlist']"><i class="fa fa-user-md"></i><span>Doctor List</span></a>
    <a class="sidebar-link" [routerLink]="['/checkslots']"><i class="fa fa-clock-o"></i><span>Check Slots</span></a>
    <a class="sidebar-link" [routerLink]="['/bookappointment']"><i class="fa fa-calendar-plus-o"></i><span>Book Appointment</span></a>
    <a class="sidebar-link" [routerLink]="['/approvalstatus']"><i class="fa fa-check-circle"></i><span>Approval Status</span></a>
    <a class="sidebar-link" [routerLink]="['/prescriptionlist']"><i class="fa fa-file-text"></i><span>Prescriptions</span></a>
  </nav>
</div>

<div class="dashboard-page">
  <div class="dashboard-welcome"><b>Welcome to MediConnect &mdash; User Dashboard</b></div>
  <div class="dashboard-grid">
    <div class="dashboard-card">
      <div class="circle"><i id="icons" class="fa fa-user-md"></i></div>
      <div class="text">Total Doctors</div>
      <div class="sub-text" *ngFor="let doctor of doctors | async">{{doctor}} doctors</div>
    </div>
    <div class="dashboard-card card-success">
      <div class="circle"><i id="icons" class="fa fa-calendar"></i></div>
      <div class="text">Total Slots</div>
      <div class="sub-text" *ngFor="let slot of slots | async">{{slot}} slots available</div>
    </div>
  </div>
</div>

<app-footer></app-footer>
